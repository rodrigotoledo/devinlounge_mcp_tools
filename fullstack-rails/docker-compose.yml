version: '3.9'

services:
  fullstack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_fullstack
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/app_development
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    command: bash -c "rm -f tmp/pids/server.pid && bundle install && bin/rails server -b 0.0.0.0"

  postgres:
    image: postgres:15
    container_name: app_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=app_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
